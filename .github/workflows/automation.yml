name: Daily Automation

on:
  schedule:
    # 매일 UTC 23:00 (한국 시간 오전 8:00)에 실행
    - cron: '0 23 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  run-scripts:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v3

      - name: Python 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 크롬 브라우저 설정
        uses: browser-actions/setup-chrome@latest
        with:
          chrome-version: stable
          
      - name: 의존성 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: config.json 파일 생성 (Secrets에서 주입)
        env:
          CONFIG_JSON: ${{ secrets.CONFIG_JSON }}
        run: |
          python -c "import os; open('config.json', 'w', encoding='utf-8').write(os.environ.get('CONFIG_JSON', '{}'))"

      - name: 1. sell_action.py 실행
        run: python sell_action.py
        continue-on-error: true

      - name: 2. erp_action.py 실행
        run: python erp_action.py
        continue-on-error: true

      - name: 3. delivery_order_action.py 실행
        run: python delivery_order_action.py
        continue-on-error: true

      - name: 4. purchase_order_action.py 실행
        run: python purchase_order_action.py
        continue-on-error: true
